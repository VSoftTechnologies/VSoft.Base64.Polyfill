# DPM package spec file
# Used to build packages

min client version: 1.0
# metadata describes the package to the user
metadata:
  id: VSoft.Base64.Polyfill
  authors: [ Vincent Parrett ]
  description: Simple Base64 Encode/Decode polyfill for versions of delphi that do not have System.NetEncoding
  projectUrl: https://github.com/VSoftTechnologies/VSoft.Base64.Polyfill
  repositoryUrl: https://github.com/VSoftTechnologies/VSoft.Base64.Polyfill
  license: Apache-2.0
  readme: README.md
  copyright: Vincent Parrett and contributors
  tags: [ base64, polyfill ]
  version: 0.1.9
  repositoryCommit: Id:5858c3f8fe78353b2b1e69148c0a36876a7d22d1

targetPlatforms:
  - compiler from: delphixe2
    compiler to: delphi13
    platforms: [ win32, win64 ]

templates:
  - name: default

    source:
      - src: ./source/*.pas
      - src: ./packages/RAD Studio 11.0/*.dpk
      - src: ./packages/RAD Studio 11.0/*.dproj
    build:
      - project: ./packages/RAD Studio 11.0/VSoft.Base64.dproj
